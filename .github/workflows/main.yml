name: Main
on:
  push:
    branches: 
        - main

jobs:
    deploy: 
        runs-on: ubuntu-latest

        steps:
            - name: Checkout 
              uses: actions/checkout@v1

            - name: NodeJS Setup
              uses: actions/setup-node@v1
              with:
                node-version: 20.19.2

            - name: Dependency Installation
              run: npm install

            - name: Build
              run: npm run build